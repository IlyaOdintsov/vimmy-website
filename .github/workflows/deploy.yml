name: Deploy vimmy.ru (Frontend)

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install & Build Frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          ls -la dist/
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

      - name: Deploy Frontend to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "frontend/dist/*"
          target: "/tmp/frontend-deploy"
          strip_components: 2
          rm: true

      - name: Apply Frontend Deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/vimmy-website/vimmy-website/frontend/dist
            sudo rm -rf /var/www/vimmy-website/vimmy-website/frontend/dist*
            sudo cp -r /tmp/frontend-deploy/* /var/www/vimmy-website/vimmy-website/frontend/dist
            sudo chown -R www-data:www-data /var/www/vimmy-website/vimmy-website/frontend/dist
            sudo find /var/www/vimmy-website/vimmy-website/frontend/dist -type d -exec chmod 755 {} \;
            sudo find /var/www/vimmy-website/vimmy-website/frontend/dist -type f -exec chmod 644 {} \;
            rm -rf /tmp/frontend-deploy
            sudo nginx -t && sudo systemctl reload nginx
            echo "Frontend deployed successfully"
