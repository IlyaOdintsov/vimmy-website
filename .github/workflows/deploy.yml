name: Deploy vimmy.ru (Frontend + Backend)

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'backend/**'
  workflow_dispatch:
    inputs: {}

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check if frontend exists
        id: check_frontend
        run: |
          if [ ! -d "frontend" ] || [ -z "$(ls -A frontend 2>/dev/null)" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Frontend folder not found - skipping deployment"
            exit 0
          else
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Frontend folder found"
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        if: steps.check_frontend.outputs.exists == 'true'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        if: steps.check_frontend.outputs.exists == 'true'
        with:
          node-version: 20

      - name: Install & Build Frontend
        if: steps.check_frontend.outputs.exists == 'true'
        run: |
          cd frontend
          npm install
          npm run build
          echo "Frontend build completed"
          ls -la dist/

      - name: Deploy Frontend to VPS
        if: steps.check_frontend.outputs.exists == 'true'
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "frontend/dist/*"
          target: "/tmp/frontend-deploy"
          strip_components: 2

      - name: Apply Frontend Deployment
        if: steps.check_frontend.outputs.exists == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            if [ ! -d "/tmp/frontend-deploy" ] || [ -z "$(ls -A /tmp/frontend-deploy 2>/dev/null)" ]; then
              echo "❌ No files to deploy! Skipping."
              exit 1
            fi
            
            sudo rm -rf /var/www/vimmy_website/frontend/dist/*
            sudo mkdir -p /var/www/vimmy_website/frontend/dist
            sudo cp -r /tmp/frontend-deploy/* /var/www/vimmy_website/frontend/dist/
            
            sudo chown -R www-data:www-data /var/www/vimmy_website/frontend/dist
            sudo find /var/www/vimmy_website/frontend/dist -type f -exec chmod 644 {} \;
            sudo find /var/www/vimmy_website/frontend/dist -type d -exec chmod 755 {} \;
            
            rm -rf /tmp/frontend-deploy
            
            echo "✅ Frontend deployed to /var/www/vimmy_website/frontend/dist"

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Check if backend exists
        id: check_backend
        run: |
          if [ ! -d "backend" ] || [ -z "$(ls -A backend 2>/dev/null)" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Backend folder not found - skipping deployment"
            exit 0
          else
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Backend folder found"
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        if: steps.check_backend.outputs.exists == 'true'

      - name: Setup Node.js for Backend
        uses: actions/setup-node@v4
        if: steps.check_backend.outputs.exists == 'true'
        with:
          node-version: 20

      - name: Install Backend Dependencies
        if: steps.check_backend.outputs.exists == 'true'
        run: |
          cd backend
          npm install
          echo "✅ Backend dependencies installed"

      - name: Build Backend (if needed)
        if: steps.check_backend.outputs.exists == 'true'
        run: |
          cd backend
          if [ -f "package.json" ] && grep -q '"build"' package.json; then
            npm run build
            echo "✅ Backend built"
          else
            echo "ℹ️ No build step needed"
          fi

      - name: Deploy Backend to VPS
        if: steps.check_backend.outputs.exists == 'true'
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "backend/*"
          target: "/tmp/backend-deploy"
          strip_components: 1

      - name: Apply Backend Deployment
        if: steps.check_backend.outputs.exists == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            if [ ! -d "/tmp/backend-deploy" ] || [ -z "$(ls -A /tmp/backend-deploy 2>/dev/null)" ]; then
              echo "❌ No files to deploy! Skipping."
              exit 1
            fi
            
            sudo mkdir -p /var/www/backend
            
            pm2 stop vimmy_backend 2>/dev/null || true
            pm2 delete vimmy_backend 2>/dev/null || true
            
            sudo rm -rf /var/www/backend/*
            sudo cp -r /tmp/backend-deploy/* /var/www/backend/
            
            sudo chown -R $USER:$USER /var/www/backend
            sudo chmod -R 755 /var/www/backend
            
            cd /var/www/backend
            npm install --production
            
            pm2 start npm --name "vimmy_backend" -- start
            pm2 save
            pm2 startup || true
            
            rm -rf /tmp/backend-deploy
            
            echo "✅ Backend deployed and started"

  reload-nginx:
    name: Reload Nginx
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()
    steps:
      - name: Reload Nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Nginx reloaded"
            echo "Full deployment completed!"
